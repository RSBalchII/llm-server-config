<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦙 Llama Model Server</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00d9ff; margin-bottom: 20px; }
        .card { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .card h2 { color: #00d9ff; margin-bottom: 15px; font-size: 1.2rem; }
        .model-list { display: grid; gap: 10px; }
        .model-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a2e; border-radius: 8px; border: 2px solid transparent; }
        .model-item.active { border-color: #00d9ff; }
        .model-item button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-load { background: #00d9ff; color: #000; }
        .btn-unload { background: #e94560; color: #fff; }
        .btn-load:disabled { opacity: 0.5; cursor: not-allowed; }
        #chat-container { display: none; }
        #messages { height: 300px; overflow-y: auto; padding: 15px; background: #0f0f23; border-radius: 8px; margin-bottom: 15px; }
        .message { margin-bottom: 15px; padding: 10px 15px; border-radius: 8px; max-width: 80%; }
        .message.user { background: #0f3460; margin-left: auto; }
        .message.assistant { background: #1a1a2e; }
        .input-row { display: flex; gap: 10px; }
        #prompt { flex: 1; padding: 12px; border: 2px solid #0f3460; border-radius: 8px; background: #0f0f23; color: #eee; font-size: 14px; }
        #prompt:focus { outline: none; border-color: #00d9ff; }
        #send-btn { padding: 12px 24px; background: #00d9ff; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 15px; }
        .status.loading { background: #0f3460; }
        .status.success { background: #1b4332; }
        .status.error { background: #5c1a1a; }
        .size { color: #888; font-size: 0.85rem; }
        #thinking { display: none; color: #00d9ff; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦙 Llama Model Server</h1>
        
        <div id="status" class="status" style="display:none"></div>
        
        <div class="card">
            <h2>📦 Available Models</h2>
            <div id="model-list" class="model-list"></div>
        </div>

        <div class="card" id="chat-container">
            <h2>💬 Chat with <span id="current-model"></span></h2>
            <div id="messages"></div>
            <div id="thinking">Model is thinking...</div>
            <div class="input-row">
                <input type="text" id="prompt" placeholder="Type your message..." />
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:3000/api';
        let currentModel = null;

        async function fetchModels() {
            const res = await fetch(`${API}/models`);
            const data = await res.json();
            renderModels(data.models, data.currentModel);
            if (data.currentModel) {
                currentModel = data.currentModel;
                showChat(data.currentModel);
            }
        }

        function renderModels(models, current) {
            const container = document.getElementById('model-list');
            container.innerHTML = models.map(m => `
                <div class="model-item ${m.name === current ? 'active' : ''}">
                    <div>
                        <strong>${m.name}</strong>
                        <span class="size">${(m.size / 1024 / 1024 / 1024).toFixed(2)} GB</span>
                    </div>
                    <button class="btn-load" 
                        ${m.name === current ? 'disabled' : ''}
                        onclick="loadModel('${m.name}')">
                        ${m.name === current ? 'Loaded' : 'Load'}
                    </button>
                </div>
            `).join('');
        }

        function showStatus(msg, type = 'loading') {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = `status ${type}`;
            el.style.display = 'block';
        }

        async function loadModel(name) {
            showStatus(`Loading ${name}...`);
            const res = await fetch(`${API}/load`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ modelPath: name })
            });
            const data = await res.json();
            if (data.success) {
                currentModel = name;
                showStatus(`Loaded ${name}`, 'success');
                showChat(name);
                fetchModels();
            } else {
                showStatus(data.error || 'Failed to load', 'error');
            }
        }

        function showChat(modelName) {
            document.getElementById('chat-container').style.display = 'block';
            document.getElementById('current-model').textContent = modelName;
        }

        async function sendMessage() {
            const input = document.getElementById('prompt');
            const prompt = input.value.trim();
            if (!prompt) return;

            const messages = document.getElementById('messages');
            messages.innerHTML += `<div class="message user">${escapeHtml(prompt)}</div>`;
            input.value = '';
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;
            document.getElementById('thinking').style.display = 'block';
            messages.scrollTop = messages.scrollHeight;

            try {
                const res = await fetch(`${API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, maxTokens: 512, temperature: 0.7 })
                });
                const data = await res.json();
                messages.innerHTML += `<div class="message assistant">${escapeHtml(data.response)}</div>`;
            } catch (err) {
                messages.innerHTML += `<div class="message assistant" style="color:#e94560">Error: ${err.message}</div>`;
            }

            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            document.getElementById('thinking').style.display = 'none';
            input.focus();
            messages.scrollTop = messages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('prompt').onkeydown = e => { if (e.key === 'Enter') sendMessage(); };

        fetchModels();
        setInterval(fetchModels, 5000);
    </script>
</body>
</html>
